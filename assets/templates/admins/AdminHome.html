{% extends 'admins/adminbase.html' %}
{% load static %}

{% block contents %}

<style>
.admin-hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding-top: 5rem;
}

.main-title {
    color: #FFD700;
    font-weight: 950;
    font-size: 3.5rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    margin-bottom: 2rem;
    line-height: 1.2;
}

.dashboard-box {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(20px);
    border: 2px solid rgba(255, 255, 255, 0.1);
    padding: 50px 80px;
    border-radius: 30px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    transition: 0.3s;
}

.dashboard-box:hover {
    border-color: #6366f1;
    transform: translateY(-10px);
}

.dashboard-box h3 {
    font-size: 2.2rem;
    font-weight: 800;
    color: white;
    margin: 0;
    letter-spacing: 1px;
}
</style>

<div class="admin-hero">
    <h1 class="main-title">
        Binary Image Classification<br>
        Using Machine Learning and<br>
        Deep Quantum Neural Networks
    </h1>

    <div class="dashboard-box">
        <h3><i class="fa-solid fa-terminal" style="color: #6366f1; margin-right: 15px;"></i> Welcome to Admin Dashboard</h3>
        <p style="color: #94a3b8; margin-top: 15px; font-weight: 600;">System Administrative Protocol Active</p>
    </div>
</div>

{% endblock %}
