{% extends 'admins/adminbase.html' %}
{% load static %}

{% block contents %}

<style>

#intro{
    margin:0;
    padding:0;
}

.admin-home{
    flex: 1;
    display:flex;
    flex-direction: column;
    justify-content:center;
    align-items:center;
    padding: 100px 20px;
}

.main-title{
    margin-bottom: 2.5rem;
    text-align:center;
    color:#FFD700;
    font-weight:900;
    line-height:1.3;
    animation:fadeDown 1.2s ease forwards;
}

.main-title .line{
    display:block;
    font-size: 2.8rem;
    text-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

@keyframes fadeDown{
    from{ opacity:0; transform:translateY(-30px); }
    to{ opacity:1; transform:translateY(0); }
}

.dashboard-box{
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 2.5rem 5rem;
    border-radius: 24px;
    text-align:center;
    color:white;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeUp 1.2s ease 0.3s forwards;
    opacity: 0;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

.dashboard-box h3{
    font-size:1.8rem;
    font-weight:700;
    margin:0;
    background: linear-gradient(to right, #fff, #cbd5e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

</style>

<section id="intro">

    <div class="admin-home">

        <h1 class="main-title">
            <span class="line">Binary Image Classification</span>
            <span class="line">Using Machine Learning and</span>
            <span class="line">Deep Quantum Neural Networks</span>
        </h1>

        <div class="dashboard-box">
            <h3>Welcome to Admin Homepage</h3>
        </div>

    </div>

</section>

{% endblock %}
