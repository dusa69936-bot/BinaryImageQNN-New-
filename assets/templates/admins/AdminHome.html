{% extends 'admins/adminbase.html' %}
{% load static %}

{% block contents %}

<style>

#intro{
    margin:0;
    padding:0;
}

.admin-home{
    flex: 1;
    display:flex;
    flex-direction: column;
    justify-content:center;
    align-items:center;
    padding: 100px 20px;
}

.main-title{
    margin-bottom: 2.5rem;
    text-align:center;
    color:#FFD700;
    font-weight:900;
    line-height:1.3;
    animation:fadeDown 1.2s ease forwards;
}

.main-title .line{
    display:block;
    font-size: 2.8rem;
    text-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

@keyframes fadeDown{
    from{ opacity:0; transform:translateY(-30px); }
    to{ opacity:1; transform:translateY(0); }
}

.dashboard-box {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 3rem 6rem;
    border-radius: 30px;
    text-align: center;
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.5),
        inset 0 0 20px rgba(255, 255, 255, 0.05);
    
    position: relative;
    overflow: hidden;
    animation: float 4s ease-in-out infinite, fadeUp 1.2s ease forwards;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
    cursor: default;
}

.dashboard-box:hover {
    transform: translateY(-10px) rotateX(5deg) rotateY(2deg);
    box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6);
    border-color: rgba(255, 255, 255, 0.3);
}

/* 🔥 Glass Shine Effect */
.dashboard-box::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
        45deg,
        transparent,
        rgba(255, 255, 255, 0.1),
        transparent
    );
    transform: rotate(45deg);
    animation: shine 6s infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

@keyframes shine {
    0% { left: -100%; }
    20% { left: 100%; }
    100% { left: 100%; }
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(50px); }
    to { opacity: 1; }
}

.dashboard-box h3 {
    font-size: 2rem;
    font-weight: 800;
    margin: 0;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #ffffff 0%, #a855f7 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

</style>

<section id="intro">

    <div class="admin-home">

        <h1 class="main-title">
            <span class="line">Binary Image Classification</span>
            <span class="line">Using Machine Learning and</span>
            <span class="line">Deep Quantum Neural Networks</span>
        </h1>

        <div class="dashboard-box">
            <h3>Welcome to Admin Homepage</h3>
        </div>

    </div>

</section>

{% endblock %}
