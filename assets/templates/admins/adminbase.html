{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
                    url("{% static 'img/digits_grid_bg.png' %}"); /* Standardized BG */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .custom-navbar {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        padding: 15px 30px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .nav-btn {
        padding: 10px 18px;
        border-radius: 10px;
        background: #000;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid #444;
        transition: 0.3s;
    }

    .nav-btn:hover {
        background: linear-gradient(135deg, #6366f1, #a855f7);
        transform: translateY(-2px);
    }

    .nav-btn:active {
        background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .active-nav {
        background: linear-gradient(135deg, #f59e0b, #f97316);
    }

    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .footer {
        text-align: center;
        padding: 10px;
        background: rgba(0,0,0,0.8);
        font-size: 14px;
    }

    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="custom-navbar">

    <a href="{% url 'AdminHome' %}" 
       class="nav-btn {% if request.path == '/AdminHome/' %}active-nav{% endif %}">
       🏠 Home
    </a>

    <a href="{% url 'view_users' %}" 
       class="nav-btn {% if request.path == '/ViewUsers/' %}active-nav{% endif %}">
       👥 User Details
    </a>

    <a href="{% url 'AdminLogout' %}" class="nav-btn">
       🚪 Logout
    </a>

</div>

<!-- 🔥 CONTENT -->
<div class="main-content">
    {% block contents %}
    {% endblock %}
</div>

<!-- 🔥 FOOTER -->
<div class="footer">
    © All Rights Reserved by @2025 Alex Corporation.
</div>

</body>
</html>
