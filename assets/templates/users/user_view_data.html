{% block subcontents %}
<section class="hero-section" style="padding-top: 6rem;">
    <div class="reveal">
        <h1 class="hero-title"><i class="fa-solid fa-database"></i> MNIST Dataset Explorer</h1>
        <p class="hero-subtitle">Visualizing the benchmark digit repository used for QNN training.</p>
    </div>

    <div class="glass-card reveal" style="margin-top: 3rem; padding: 3rem; text-align: center;">
        <h3 style="color: #FFD700; margin-bottom: 2rem;">Dataset Sample Preview</h3>
        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: inline-block;">
            <img src="/media/mnist.png" style="max-width: 100%; border-radius: 8px; filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.4));" alt="MNIST Samples"/>
        </div>
        <p style="margin-top: 2rem; color: #94a3b8; font-size: 0.9rem;">
            This manifest represents a subset of 60,000 training images and 10,000 testing images currently localized in the environment.
        </p>
    </div>
</section>
{% endblock %}
